# active-upstreams.conf is loaded automatically by the stock nginx.conf
# wildcard: include /etc/nginx/conf.d/*.conf;

server {
    listen 80;
    server_name _;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    proxy_connect_timeout 1s;
    proxy_send_timeout 5s;
    proxy_read_timeout 5s;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Request-Id $request_id;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = /health {
        default_type application/json;
        return 200 '{"status":"ok","gateway":"nginx"}';
    }

    location /api/catalog {
        proxy_pass http://catalog_backend;
    }

    location /api/cart {
        proxy_pass http://cart_backend;
    }

    location /api/checkout {
        proxy_pass http://checkout_backend;
    }

    location /api/payment {
        proxy_pass http://payment_backend;
    }

    location /api/user {
        proxy_pass http://user_backend;
    }

    location / {
        proxy_pass http://catalog_backend;
    }
}
